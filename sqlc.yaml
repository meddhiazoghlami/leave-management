version: "2"
sql:
  - engine: "postgresql"
    # sqlc reads the golang-migrate files as the schema: it applies the *.up.sql
    # migrations in order and ignores the *.down.sql ones. Same source of truth
    # as the running database — no separate schema file to drift.
    schema: "migrations"
    queries: "query.sql"
    gen:
      go:
        package: "db"
        # Phase 9: the generated package moves under internal/ as part of the
        # restructure. Everything else in the app imports it from there.
        out: "internal/db"
        # Generate code against the pgx/v5 pool we already use (not database/sql).
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_empty_slices: true
        overrides:
          # NOT NULL timestamptz/date columns map straight to time.Time instead
          # of pgtype wrappers, so templ `.Format(...)` and Go date math just
          # work. Nullable columns (manager_id, decided_by, decided_at) keep
          # sqlc's pgtype defaults — and our queries avoid SELECTing the
          # nullable timestamps so no NULL is ever scanned into a time.Time.
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "date"
            go_type: "time.Time"
